<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNNU — WebXR Demo</title>
    <!-- A-Frame: runs WebXR in Meta Quest Browser with no install needed -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body { margin: 0; background: #000; }
        /* Back button for non-VR devices */
        #back-btn {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 9999;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        #back-btn:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <a id="back-btn" href="index.html">← Back to Site</a>

    <a-scene
        background="color: #020c1b"
        fog="type: linear; color: #020c1b; near: 10; far: 30"
        renderer="antialias: true; colorManagement: true;"
        vr-mode-ui="enabled: true"
    >

        <!-- === CAMERA & CONTROLS === -->
        <!-- On Meta Quest: head tracking moves camera automatically -->
        <!-- On desktop: click + drag to look around -->
        <a-entity id="rig" position="0 1.6 3">
            <a-camera look-controls wasd-controls="enabled: false">
                <!-- Reticle for gaze-based interaction on Quest -->
                <a-entity cursor="fuse: false" raycaster="objects: .interactive"
                    position="0 0 -0.5"
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
                    material="color: #0ea5e9; shader: flat; opacity: 0.8">
                </a-entity>
            </a-camera>
        </a-entity>

        <!-- === ENVIRONMENT: subtle particle grid floor === -->
        <a-entity id="floor">
            <a-plane
                position="0 0 0"
                rotation="-90 0 0"
                width="40" height="40"
                color="#020c1b"
                metalness="0" roughness="1">
            </a-plane>
            <!-- Grid lines effect -->
            <a-entity
                position="0 0.01 0"
                rotation="-90 0 0"
                geometry="primitive: plane; width: 40; height: 40"
                material="color: #0ea5e9; wireframe: true; opacity: 0.08; transparent: true">
            </a-entity>
        </a-entity>

        <!-- === AMBIENT & DIRECTIONAL LIGHT === -->
        <a-light type="ambient" color="#0a2540" intensity="1.5"></a-light>
        <a-light type="directional" color="#0ea5e9" intensity="0.8"
            position="2 4 3" castShadow="false">
        </a-light>
        <a-light type="point" color="#0ea5e9" intensity="1.2"
            position="0 2.5 0" distance="8" decay="2">
        </a-light>

        <!-- === BACKGROUND PARTICLES (floating dots) === -->
        <a-entity id="particles">
            <a-sphere position="-4 3 -5"  radius="0.04" color="#38bdf8" opacity="0.6" material="shader: flat"></a-sphere>
            <a-sphere position=" 3 2 -6"  radius="0.03" color="#0ea5e9" opacity="0.4" material="shader: flat"></a-sphere>
            <a-sphere position="-2 4 -7"  radius="0.05" color="#7dd3fc" opacity="0.5" material="shader: flat"></a-sphere>
            <a-sphere position=" 5 1.5 -4" radius="0.04" color="#38bdf8" opacity="0.7" material="shader: flat"></a-sphere>
            <a-sphere position="-6 2.5 -6" radius="0.03" color="#0ea5e9" opacity="0.3" material="shader: flat"></a-sphere>
            <a-sphere position=" 1 5 -8"  radius="0.06" color="#bae6fd" opacity="0.4" material="shader: flat"></a-sphere>
            <a-sphere position="-3 1.5 -3" radius="0.04" color="#38bdf8" opacity="0.5" material="shader: flat"></a-sphere>
            <a-sphere position=" 4 3.5 -7" radius="0.05" color="#0ea5e9" opacity="0.6" material="shader: flat"></a-sphere>
        </a-entity>

        <!-- === LOGO PANEL (main floating logo) === -->
        <a-entity id="logo-board" position="0 1.8 -2.5"
            animation="property: rotation; to: 0 5 0; dur: 4000; dir: alternate; easing: easeInOutSine; loop: true">

            <!-- Dark glassy backing -->
            <a-plane
                width="2.2" height="0.9"
                color="#061525"
                opacity="0.92"
                material="transparent: true; metalness: 0.3; roughness: 0.5">
            </a-plane>

            <!-- Accent top border line -->
            <a-plane
                position="0 0.42 0.001"
                width="2.2" height="0.025"
                color="#0ea5e9"
                material="shader: flat; opacity: 0.9; transparent: true">
            </a-plane>

            <!-- SNNU Text -->
            <a-text
                value="SNN-Unit"
                align="center"
                color="#ffffff"
                font="https://cdn.aframe.io/fonts/mozillavr.fnt"
                width="3.5"
                position="0 0.15 0.01">
            </a-text>

            <!-- Subtitle -->
            <a-text
                value="Systems Neuroscience & Neurotechnology"
                align="center"
                color="#7dd3fc"
                font="https://cdn.aframe.io/fonts/mozillavr.fnt"
                width="2.8"
                position="0 -0.15 0.01">
            </a-text>

            <!-- University text -->
            <a-text
                value="Saarland University"
                align="center"
                color="#475569"
                font="https://cdn.aframe.io/fonts/mozillavr.fnt"
                width="2.2"
                position="0 -0.32 0.01">
            </a-text>
        </a-entity>

        <!-- === LEFT: Lab icons panel === -->
        <a-entity position="-2.2 1.6 -2.5" rotation="0 25 0">
            <a-plane width="1.1" height="1.3" color="#061525" opacity="0.85"
                material="transparent: true">
            </a-plane>
            <a-text value="Labs" align="center" color="#0ea5e9" width="1.8"
                position="0 0.52 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Mindscan Lab" align="center" color="#e2e8f0" width="1.5"
                position="0 0.28 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Translational Lab" align="center" color="#e2e8f0" width="1.5"
                position="0 0.1 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Multiscale Lab" align="center" color="#e2e8f0" width="1.5"
                position="0 -0.08 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Digital Realities Lab" align="center" color="#38bdf8" width="1.5"
                position="0 -0.26 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
        </a-entity>

        <!-- === RIGHT: Stat panel === -->
        <a-entity position="2.2 1.6 -2.5" rotation="0 -25 0">
            <a-plane width="1.1" height="1.3" color="#061525" opacity="0.85"
                material="transparent: true">
            </a-plane>
            <a-text value="Research" align="center" color="#0ea5e9" width="1.8"
                position="0 0.52 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Neural Engineering" align="center" color="#e2e8f0" width="1.5"
                position="0 0.28 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Brain-Computer Interfaces" align="center" color="#e2e8f0" width="1.5"
                position="0 0.1 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Neurotechnology" align="center" color="#e2e8f0" width="1.5"
                position="0 -0.08 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
            <a-text value="Saarland, Germany" align="center" color="#38bdf8" width="1.5"
                position="0 -0.26 0.01" font="https://cdn.aframe.io/fonts/mozillavr.fnt">
            </a-text>
        </a-entity>

        <!-- === BOTTOM glow ring on floor === -->
        <a-torus
            position="0 0.02 -2.5"
            rotation="-90 0 0"
            radius="1.5" radius-tubular="0.015"
            color="#0ea5e9"
            material="shader: flat; opacity: 0.25; transparent: true">
        </a-torus>

    </a-scene>
</body>
</html>
